<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🦀 Proxy Pool</title>
<style>
/* ========== Reset & Base ========== */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#05090f;--surface:#0c1320;--surface2:#111b2b;--surface3:#192538;
  --border:#1e3048;--border-hover:#2d4a6a;
  --text:#bcc8d6;--text2:#7b8fa6;--text3:#546780;
  --accent:#3b82f6;--accent2:#60a5fa;--accent-glow:#3b82f640;
  --green:#22c55e;--green-bg:#22c55e18;--green-border:#22c55e40;
  --yellow:#eab308;--yellow-bg:#eab30818;--yellow-border:#eab30840;
  --red:#ef4444;--red-bg:#ef444418;--red-border:#ef444440;
  --purple:#a855f7;--purple-bg:#a855f718;--purple-border:#a855f740;
  --radius:12px;--radius-sm:8px;--radius-xs:6px;
  --shadow:0 4px 24px #00000040,0 1px 3px #00000030;
  --font-mono:'JetBrains Mono','SF Mono','Cascadia Code',monospace;
}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
  background:var(--bg);color:var(--text);min-height:100vh;
  background-image:radial-gradient(ellipse 80% 50% at 50% -20%,#1e3a5f20,transparent);
}

/* ========== Header ========== */
.header{
  background:var(--surface);border-bottom:1px solid var(--border);
  padding:14px 28px;display:flex;align-items:center;justify-content:space-between;
  backdrop-filter:blur(12px);position:sticky;top:0;z-index:100;
}
.header-brand{display:flex;align-items:center;gap:10px}
.header-brand h1{font-size:18px;font-weight:700;color:#e2e8f0;letter-spacing:-.3px}
.header-brand .dot{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1;box-shadow:0 0 8px var(--green)}50%{opacity:.4;box-shadow:0 0 2px var(--green)}}
.header-right{display:flex;align-items:center;gap:10px}

/* ========== Buttons ========== */
.btn{
  display:inline-flex;align-items:center;gap:6px;padding:7px 15px;
  border-radius:var(--radius-xs);font-size:13px;font-weight:500;
  cursor:pointer;transition:all .15s;border:1px solid var(--border);
  background:var(--surface2);color:var(--text2);white-space:nowrap;
  user-select:none;text-decoration:none;
}
.btn:hover{background:var(--surface3);color:var(--text);border-color:var(--border-hover)}
.btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn.primary:hover{background:var(--accent2);box-shadow:0 0 16px var(--accent-glow)}
.btn.ghost{background:transparent;border-color:transparent}
.btn.ghost:hover{background:var(--surface2);border-color:var(--border)}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-xs{padding:3px 8px;font-size:11px;border-radius:4px}

/* ========== Container ========== */
.container{padding:24px 28px;max-width:1440px;margin:0 auto}

/* ========== Stats Cards ========== */
.cards{
  display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:14px;margin-bottom:24px;
}
.card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);padding:18px 20px;
  position:relative;overflow:hidden;transition:all .25s;
}
.card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--accent),transparent);
  opacity:0;transition:opacity .25s;
}
.card:hover::before{opacity:1}
.card:hover{border-color:var(--border-hover);transform:translateY(-2px);box-shadow:var(--shadow)}
.card-icon{font-size:24px;margin-bottom:6px}
.card-label{font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px}
.card-value{font-size:34px;font-weight:800;letter-spacing:-1px;line-height:1}
.card-value.accent{color:var(--accent2)}
.card-value.green{color:var(--green)}
.card-value.yellow{color:var(--yellow)}
.card-value.purple{color:var(--purple)}
.card-sub{font-size:11px;color:var(--text3);margin-top:4px}

/* ========== Toolbar ========== */
.toolbar{
  display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap;align-items:center;
}
.search{
  background:var(--surface);border:1px solid var(--border);color:var(--text);
  padding:8px 14px;border-radius:var(--radius-xs);font-size:13px;
  width:280px;outline:none;transition:border-color .2s;
}
.search::placeholder{color:var(--text3)}
.search:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}

.filter-group{display:flex;gap:4px}
.filter-btn{
  background:var(--surface2);border:1px solid var(--border);color:var(--text2);
  padding:6px 12px;border-radius:var(--radius-xs);cursor:pointer;
  font-size:12px;font-weight:500;transition:all .15s;
}
.filter-btn:hover{color:var(--text);border-color:var(--border-hover)}
.filter-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}

.toolbar-right{margin-left:auto;display:flex;align-items:center;gap:10px}

/* ========== Table ========== */
.table-wrap{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);overflow:hidden;
}
table{width:100%;border-collapse:collapse}
thead{position:sticky;top:0;z-index:2}
th{
  background:var(--surface2);padding:10px 14px;text-align:left;
  font-size:11px;font-weight:600;color:var(--text2);
  text-transform:uppercase;letter-spacing:.6px;cursor:pointer;
  user-select:none;white-space:nowrap;border-bottom:1px solid var(--border);
  transition:color .15s;
}
th:hover{color:var(--accent2)}
th .sort-icon{margin-left:3px;font-size:9px;opacity:.6}
td{padding:9px 14px;font-size:13px;border-bottom:1px solid #ffffff05;white-space:nowrap}
tr:hover td{background:var(--surface2)}
.addr{
  font-family:var(--font-mono);font-size:12px;color:var(--accent2);
  cursor:pointer;transition:color .15s;
}
.addr:hover{color:#93c5fd;text-decoration:underline}
.score-bar-wrap{display:flex;align-items:center;gap:8px}
.score-bar{
  display:inline-block;width:56px;height:5px;border-radius:3px;
  background:var(--surface3);overflow:hidden;
}
.score-fill{height:100%;border-radius:3px;transition:width .4s ease}
.score-h{background:var(--green)}
.score-m{background:var(--yellow)}
.score-l{background:var(--red)}
.protocol-tag{
  display:inline-block;padding:2px 7px;border-radius:4px;
  font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.3px;
}
.pt-http{background:#1e3a5f;color:#60a5fa}
.pt-https{background:#172e45;color:#7abef5}
.pt-socks5{background:#2a1f3a;color:#c4b5fd}
.pt-socks4{background:#2d1b30;color:#d8b4fe}
.empty-state{text-align:center;padding:80px 20px;color:var(--text3)}
.empty-state .icon{font-size:48px;margin-bottom:12px}
.empty-state p{font-size:14px;margin-bottom:4px}
.empty-state .hint{font-size:12px;color:var(--text3)}

/* ========== Settings Panel ========== */
.overlay{
  position:fixed;inset:0;background:#00000070;z-index:199;
  opacity:0;pointer-events:none;transition:opacity .3s;
}
.overlay.open{opacity:1;pointer-events:auto}
.settings-panel{
  position:fixed;top:0;right:0;height:100vh;width:420px;max-width:100vw;
  background:var(--surface);z-index:200;
  border-left:1px solid var(--border);
  transform:translateX(100%);transition:transform .3s cubic-bezier(.16,1,.3,1);
  display:flex;flex-direction:column;
}
.settings-panel.open{transform:translateX(0)}
.settings-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:18px 24px;border-bottom:1px solid var(--border);
}
.settings-header h3{font-size:16px;font-weight:600;color:#e2e8f0;display:flex;align-items:center;gap:8px}
.settings-body{flex:1;overflow-y:auto;padding:20px 24px;display:flex;flex-direction:column;gap:20px}
.settings-group{display:flex;flex-direction:column;gap:6px}
.settings-group label{
  font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;
}
.settings-group input, .settings-group select{
  background:var(--surface2);border:1px solid var(--border);color:var(--text);
  padding:10px 14px;border-radius:var(--radius-xs);font-size:13px;
  outline:none;transition:border-color .2s;font-family:var(--font-mono);
  width:100%;
}
.settings-group input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}
.settings-group .desc{font-size:11px;color:var(--text3);margin-top:2px}
.settings-footer{
  padding:16px 24px;border-top:1px solid var(--border);
  display:flex;gap:10px;justify-content:flex-end;
}

/* ========== Toast ========== */
.toast-container{position:fixed;top:20px;right:20px;z-index:300;display:flex;flex-direction:column;gap:8px}
.toast{
  padding:12px 20px;border-radius:var(--radius-sm);font-size:13px;font-weight:500;
  animation:slideIn .3s ease;box-shadow:var(--shadow);display:flex;align-items:center;gap:8px;
  max-width:380px;
}
.toast.success{background:#166534;border:1px solid var(--green-border);color:#bbf7d0}
.toast.error{background:#7f1d1d;border:1px solid var(--red-border);color:#fecaca}
.toast.info{background:#1e3a5f;border:1px solid var(--accent);color:#bfdbfe}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes slideOut{from{transform:translateX(0);opacity:1}to{transform:translateX(100%);opacity:0}}

/* ========== Responsive ========== */
@media(max-width:768px){
  .header{padding:12px 16px}
  .container{padding:16px}
  .cards{grid-template-columns:repeat(2,1fr);gap:8px}
  .card{padding:12px 14px}
  .card-value{font-size:26px}
  .toolbar{flex-direction:column;align-items:stretch}
  .search{width:100%}
  .toolbar-right{margin-left:0}
  .settings-panel{width:100%}
}

/* ========== Status Dot ========== */
.status-dot{width:6px;height:6px;border-radius:50%;display:inline-block;margin-right:4px}
.status-dot.green{background:var(--green)}
.status-dot.yellow{background:var(--yellow)}
.status-dot.red{background:var(--red)}
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="header-brand">
    <h1>🦀 Proxy Pool</h1>
    <div class="dot" id="statusDot" title="运行中"></div>
  </div>
  <div class="header-right">
    <span style="font-size:12px;color:var(--text3)" id="lastUpdate">—</span>
    <button class="btn btn-sm" onclick="doRefresh()" title="刷新">🔄</button>
    <button class="btn btn-sm" onclick="openSettings()">⚙️ 设置</button>
  </div>
</div>

<!-- Container -->
<div class="container">

  <!-- Stats Cards -->
  <div class="cards">
    <div class="card">
      <div class="card-icon">📦</div>
      <div class="card-label">总代理数</div>
      <div class="card-value accent" id="statTotal">—</div>
      <div class="card-sub">包含活跃和冷却</div>
    </div>
    <div class="card">
      <div class="card-icon">✅</div>
      <div class="card-label">活跃代理</div>
      <div class="card-value green" id="statActive">—</div>
      <div class="card-sub">立即可用</div>
    </div>
    <div class="card">
      <div class="card-icon">🧊</div>
      <div class="card-label">冷却中</div>
      <div class="card-value yellow" id="statCooldown">—</div>
      <div class="card-sub">等待恢复</div>
    </div>
    <div class="card">
      <div class="card-icon">📊</div>
      <div class="card-label">平均评分</div>
      <div class="card-value purple" id="statScore">—</div>
      <div class="card-sub">综合质量指数</div>
    </div>
  </div>

  <!-- Toolbar -->
  <div class="toolbar">
    <input class="search" placeholder="🔍 搜索 IP:Port ..." id="searchInput" oninput="renderTable()">
    <div class="filter-group" id="filterGroup">
      <button class="filter-btn active" data-proto="all" onclick="setFilter('all',this)">全部</button>
      <button class="filter-btn" data-proto="http" onclick="setFilter('http',this)">HTTP</button>
      <button class="filter-btn" data-proto="https" onclick="setFilter('https',this)">HTTPS</button>
      <button class="filter-btn" data-proto="socks5" onclick="setFilter('socks5',this)">SOCKS5</button>
      <button class="filter-btn" data-proto="socks4" onclick="setFilter('socks4',this)">SOCKS4</button>
    </div>
    <div class="toolbar-right">
      <span style="font-size:12px;color:var(--text3)" id="proxyCount">0个代理</span>
    </div>
  </div>

  <!-- Proxy Table -->
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th onclick="doSort('addr')">地址 <span class="sort-icon" id="si-addr"></span></th>
          <th onclick="doSort('protocol')">协议 <span class="sort-icon" id="si-protocol"></span></th>
          <th onclick="doSort('success_rate')" style="width:90px">成功率 <span class="sort-icon" id="si-success_rate"></span></th>
          <th onclick="doSort('avg_latency_ms')" style="width:80px">延迟 <span class="sort-icon" id="si-avg_latency_ms"></span></th>
          <th onclick="doSort('score')">评分 <span class="sort-icon" id="si-score">▼</span></th>
          <th onclick="doSort('total_checks')" style="width:80px">检测 <span class="sort-icon" id="si-total_checks"></span></th>
        </tr>
      </thead>
      <tbody id="tbody">
        <tr><td colspan="6"><div class="empty-state"><div class="icon">⏳</div><p>加载中...</p></div></td></tr>
      </tbody>
    </table>
  </div>
</div>

<!-- Settings Overlay -->
<div class="overlay" id="overlay" onclick="closeSettings()"></div>
<div class="settings-panel" id="settingsPanel">
  <div class="settings-header">
    <h3>⚙️ 系统设置</h3>
    <button class="btn btn-sm btn-ghost" onclick="closeSettings()">✕</button>
  </div>
  <div class="settings-body">
    <div class="settings-group">
      <label>🔀 上游代理地址</label>
      <input type="text" id="cfgUpstream" placeholder="留空直连，如 http://127.0.0.1:7890" autocomplete="off">
      <div class="desc">抓取代理源时使用的上游代理。支持 HTTP / SOCKS5。留空则直连抓取。</div>
    </div>
    <div class="settings-group">
      <label>⏱️ 抓取间隔（秒）</label>
      <input type="number" id="cfgFetchInterval" placeholder="300" min="30" max="86400">
      <div class="desc">每隔多少秒从源站抓取一次新代理。最小30秒。</div>
    </div>
    <div class="settings-group">
      <label>📦 最大池容量</label>
      <input type="number" id="cfgMaxPool" placeholder="5000" min="100" max="50000">
      <div class="desc">代理池最大条目数，超出时低分代理会被淘汰。</div>
    </div>
  </div>
  <div class="settings-footer">
    <button class="btn" onclick="closeSettings()">取消</button>
    <button class="btn primary" onclick="saveSettings()">💾 保存配置</button>
  </div>
</div>

<!-- Toast Container -->
<div class="toast-container" id="toastContainer"></div>

<script>
let proxies=[],sortField='score',sortRev=true,filterProto='all',refreshTimer;

// ========== Core ==========
async function doRefresh(){
  document.getElementById('statusDot').style.background='var(--yellow)';
  try{
    const[stats,px]=await Promise.all([
      fetch('/api/stats').then(r=>r.json()),
      fetch('/api/proxies?limit=2000').then(r=>r.json())
    ]);
    proxies=px;
    updateStats(stats);
    renderTable();
    document.getElementById('lastUpdate').textContent=new Date().toLocaleTimeString();
    document.getElementById('statusDot').style.background='var(--green)';
    document.getElementById('proxyCount').textContent=proxies.length+'个代理';
  }catch(e){
    console.error(e);
    document.getElementById('statusDot').style.background='var(--red)';
  }
}

function updateStats(s){
  document.getElementById('statTotal').textContent=s.total.toLocaleString();
  document.getElementById('statActive').textContent=s.active.toLocaleString();
  document.getElementById('statCooldown').textContent=s.cooldown.toLocaleString();
  document.getElementById('statScore').textContent=s.avg_score.toFixed(1);
}

// ========== Table ==========
function setFilter(proto,btn){
  filterProto=proto;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderTable();
}

function doSort(field){
  if(sortField===field)sortRev=!sortRev;
  else{sortField=field;sortRev=field==='score'||field==='success_rate';}
  document.querySelectorAll('.sort-icon').forEach(e=>e.textContent='');
  const icon=document.getElementById('si-'+field);
  if(icon)icon.textContent=sortRev?'▼':'▲';
  renderTable();
}

function renderTable(){
  const search=document.getElementById('searchInput').value.toLowerCase();
  let filtered=proxies.filter(p=>{
    if(filterProto!=='all'&&p.protocol!==filterProto)return false;
    if(search&&!p.addr.toLowerCase().includes(search))return false;
    return true;
  });
  filtered.sort((a,b)=>{
    let va=a[sortField],vb=b[sortField];
    if(typeof va==='string')va=va.toLowerCase();
    if(typeof vb==='string')vb=vb.toLowerCase();
    if(va<vb)return sortRev?1:-1;
    if(va>vb)return sortRev?-1:1;
    return 0;
  });
  const tbody=document.getElementById('tbody');
  if(!filtered.length){
    tbody.innerHTML='<tr><td colspan="6"><div class="empty-state"><div class="icon">😕</div><p>没有匹配的代理</p><div class="hint">等待系统自动抓取，或检查上游代理设置</div></div></td></tr>';
    return;
  }
  tbody.innerHTML=filtered.map(p=>{
    const rate=(p.success_rate*100).toFixed(0);
    const rateC=p.success_rate>=.7?'var(--green)':p.success_rate>=.4?'var(--yellow)':'var(--red)';
    const sc=p.score>=70?'score-h':p.score>=40?'score-m':'score-l';
    const lat=p.avg_latency_ms>0?(p.avg_latency_ms/1000).toFixed(1)+'s':'—';
    return`<tr>
      <td><span class="addr" onclick="cp('${p.addr}')" title="点击复制">${p.addr}</span></td>
      <td><span class="protocol-tag pt-${p.protocol}">${p.protocol.toUpperCase()}</span></td>
      <td><span style="color:${rateC};font-weight:600">${rate}%</span></td>
      <td style="color:var(--text)">${lat}</td>
      <td><div class="score-bar-wrap"><span class="score-bar"><span class="score-fill ${sc}" style="width:${p.score}%"></span></span><span style="font-weight:600;font-size:12px;color:${sc==='score-h'?'var(--green)':sc==='score-m'?'var(--yellow)':'var(--red)'}">${p.score.toFixed(0)}</span></div></td>
      <td style="color:var(--text3)">${p.total_checks}</td>
    </tr>`;
  }).join('');
}

// ========== Copy ==========
function cp(addr){
  navigator.clipboard.writeText(addr).then(()=>toast('✅ 已复制: '+addr,'success'));
}

// ========== Settings ==========
function openSettings(){
  fetch('/api/config').then(r=>r.json()).then(c=>{
    document.getElementById('cfgUpstream').value=c.fetch_upstream_proxy||'';
    document.getElementById('cfgFetchInterval').value=c.fetch_interval_secs;
    document.getElementById('cfgMaxPool').value=c.max_pool_size;
  }).catch(()=>{});
  document.getElementById('overlay').classList.add('open');
  document.getElementById('settingsPanel').classList.add('open');
}

function closeSettings(){
  document.getElementById('overlay').classList.remove('open');
  document.getElementById('settingsPanel').classList.remove('open');
}

async function saveSettings(){
  const body={};
  const upstream=document.getElementById('cfgUpstream').value.trim();
  body.fetch_upstream_proxy=upstream;
  const interval=parseInt(document.getElementById('cfgFetchInterval').value);
  if(interval>=30)body.fetch_interval_secs=interval;
  const max=parseInt(document.getElementById('cfgMaxPool').value);
  if(max>=100)body.max_pool_size=max;
  try{
    const res=await fetch('/api/config',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    if(res.ok){
      const c=await res.json();
      document.getElementById('cfgUpstream').value=c.fetch_upstream_proxy||'';
      toast('✅ 配置已保存，下次抓取生效','success');
      closeSettings();
    }else{
      toast('❌ 保存失败','error');
    }
  }catch(e){toast('❌ 网络错误','error');}
}

// ========== Toast ==========
function toast(msg,type='info'){
  const ct=document.getElementById('toastContainer');
  const el=document.createElement('div');
  el.className='toast '+type;
  el.textContent=msg;
  ct.appendChild(el);
  setTimeout(()=>{el.style.animation='slideOut .3s ease forwards';setTimeout(()=>el.remove(),300);},2500);
}

// ========== Keyboard ==========
document.addEventListener('keydown',e=>{
  if(e.key==='Escape')closeSettings();
  if(e.ctrlKey&&e.key==='k'){e.preventDefault();document.getElementById('searchInput').focus();}
  if(e.ctrlKey&&e.key===','){e.preventDefault();openSettings();}
});

// ========== Init ==========
doRefresh();
refreshTimer=setInterval(doRefresh,8000);
</script>
</body>
</html>
